[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # NEXT_PUBLIC_* estan disenadas para ir en el bundle del cliente.
  # SUPABASE_SERVICE_ROLE_KEY solo se usa en codigo "use server" (src/lib/actions/admin.ts)
  # y nunca se envia al navegador, aunque el scanner la detecte en el build de la funcion.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY"

[[plugins]]
  package = "@netlify/plugin-nextjs"
